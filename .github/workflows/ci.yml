name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]

    steps:
      - uses: actions/checkout@v4

      # ── Linux ──────────────────────────────────────────────────────────────
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            clang ninja-build \
            freeglut3-dev \
            libgl1-mesa-dev libglu1-mesa-dev

      # ── macOS ──────────────────────────────────────────────────────────────
      # freeglut from Homebrew provides <GL/freeglut.h>; the system GLUT.framework
      # only has <GLUT/glut.h> and cannot satisfy the project's includes.
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ninja freeglut
          echo "FREEGLUT_PREFIX=$(brew --prefix freeglut)" >> "$GITHUB_ENV"

      # ── Configure ──────────────────────────────────────────────────────────
      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: cmake --preset ci

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: cmake --preset ci -DCMAKE_PREFIX_PATH="$FREEGLUT_PREFIX"

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build --preset ci

      # ── Test ───────────────────────────────────────────────────────────────
      # The test binary links against OpenGL/GLUT but never calls glutInit,
      # so no display is required on headless runners.
      - name: Test
        run: ctest --preset ci --output-on-failure
